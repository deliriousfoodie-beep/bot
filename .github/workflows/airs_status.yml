name: AIRS Trend Status

on:
  schedule:
    # 13:40 UTC is 6:40 AM PST
    - cron: '40 13 * * 1-5'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install yfinance pandas discord.py

- name: Run AIRS Report
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          MY_DISCORD_USER_ID: ${{ secrets.MY_DISCORD_USER_ID }}
        run: python airs_status.py

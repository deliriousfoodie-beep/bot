name: AIRS Live EMA Monitor

on:
  schedule:
    # Runs every 5 minutes from 13:30 to 20:00 UTC (6:30 AM - 1:00 PM PST)
    - cron: '*/5 13-20 * * 1-5'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install yfinance pandas discord.py

      - name: Run Monitor
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          MY_DISCORD_USER_ID: ${{ secrets.MY_DISCORD_USER_ID }}
        run: python airs_monitor.py

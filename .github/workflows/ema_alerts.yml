name: AIRS EMA Alert System

on:
  schedule:
    - cron: '0 14-21 * * 1-5'
  workflow_dispatch: 

jobs:
  check-ema:
    runs-on: ubuntu-latest
    env:
      # This clears the "Node.js 20" warning you saw
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install yfinance pandas

      - name: Run EMA Monitor
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        # Adding '|| exit 1' ensures we catch the exact python error
        run: python ema_monitor.py
